name: Publish Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify build
        run: ./gradlew test bootJar --no-daemon

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push container image
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          GIT_SHA: ${{ github.sha }}
        run: |
          owner="$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/anonix"

          docker build \
            --tag "${image}:latest" \
            --tag "${image}:sha-${GIT_SHA}" \
            .

          docker push "${image}:latest"
          docker push "${image}:sha-${GIT_SHA}"
