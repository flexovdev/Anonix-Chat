spring.application.name=Anonymous Chat
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

spring.datasource.url=${CHAT_DATASOURCE_URL:jdbc:h2:mem:anonymouschat;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${CHAT_DATASOURCE_USERNAME:sa}
spring.datasource.password=${CHAT_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

logging.level.root=WARN
logging.level.me.flexov.anonymouschat=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN

spring.mvc.log-request-details=false
server.tomcat.accesslog.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

app.chat.persist-history=false
app.chat.persist-history=${CHAT_PERSIST_HISTORY:false}
app.chat.session-lifetime-minutes=${CHAT_SESSION_LIFETIME_MINUTES:30}
app.chat.max-message-length=${CHAT_MAX_MESSAGE_LENGTH:4096}
app.chat.cleanup-messages-ms=${CHAT_CLEANUP_MESSAGES_MS:300000}
app.chat.cleanup-sessions-ms=${CHAT_CLEANUP_SESSIONS_MS:300000}
app.chat.cleanup-auto-ms=${CHAT_CLEANUP_AUTO_MS:300000}
